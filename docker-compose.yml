version: '3.8'

services:
  cache:
    image: redis:7-alpine
    hostname: cache
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: '50M'
    networks:
      - rinha-net
  db:
    image: postgres:16-alpine
    hostname: db
    restart: always
    environment:
      - POSTGRES_PASSWORD=rinhabackend
      - POSTGRES_USER=rinhabackend
      - POSTGRES_DB=rinhabackend
    volumes:
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: '120M'
    networks:
      - rinha-net
  app1:
    build:
      context: .
      dockerfile: Dockerfile
    hostname: app1
    restart: always
    depends_on:
      - db
      - cache
    networks:
      - rinha-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: '75M'

  app2:
    build:
      context: .
      dockerfile: Dockerfile
    hostname: app2
    restart: always
    depends_on:
      - db
      - cache
    networks:
      - rinha-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: '75M'

  # Load Balancer
  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    depends_on:
      - app1
      - app2
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: '30M'
    networks:
      - rinha-net

networks:
  rinha-net:
    driver: bridge
